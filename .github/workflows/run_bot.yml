name: Instagram Follow Bot

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Instagram Bot
      env:
        IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
      run: python bot.py

    - name: Commit and Push if JSON updated
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add following_data.json
        git commit -m "Update following data [skip ci]" || echo "No changes to commit"
        git push
